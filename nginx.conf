daemon off;
events {}

http {
    include mime.types;

    upstream minio_backend {
        server 127.0.0.1:9000;
    }

    server {
        listen 5173;
        server_name localhost;

        set $bucket "web";

        location / {
            # FIX: Set the Host header to the backend's address
            proxy_set_header Host 127.0.0.1:9000;
            
            proxy_pass http://minio_backend/$bucket$uri;

            proxy_intercept_errors on;
            error_page 404 =200 /index.html;
        }

        location = / {
            proxy_set_header Host 127.0.0.1:9000;
            proxy_pass http://minio_backend/$bucket/index.html;
        }

        location = /index.html {
            proxy_set_header Host 127.0.0.1:9000;
            proxy_pass http://minio_backend/$bucket/index.html;
        }

        access_log ./access_log;
        error_log ./error_log;
    }
}

